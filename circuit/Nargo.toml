[package]
name = "singpass_zk"
type = "bin"
authors = [""]
compiler_version = ">=1.0.0"

[dependencies]
# jp4g fork of noir-lang/noir_json_parser. Pins to main HEAD + get_number_from_path
# (upstream PR https://github.com/noir-lang/noir_json_parser/pull/98). Swap back to
# the upstream tag once that PR is merged and released.
json_parser = { git = "https://github.com/jp4g/noir_json_parser", tag = "v0.5.0-pr98" }
sha256 = { git = "https://github.com/noir-lang/sha256", tag = "v0.3.0" }
base64 = { git = "https://github.com/noir-lang/noir_base64", tag = "main" }
nodash = { git = "https://github.com/olehmisar/nodash/", tag = "v0.45.0" }
poseidon = { git = "https://github.com/noir-lang/poseidon", tag = "v0.3.0" }
